      .slide-name { font-size: 20px; font-weight: 700; }
      .slide-count { color: #64748b; font-size: 14px; font-weight: 700; }

        },
        "Aharbal Waterfall": {
          heroImage: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Aharbal_Waterfall.jpg/1280px-Aharbal_Waterfall.jpg",
          subtitle: "The Niagara of Kashmir — a powerful waterfall on the scenic Mughal Road.",
          history: "Aharbal Waterfall, often called the Niagara of Kashmir, is formed by the Vishav river plunging about 25 metres over a rocky cliff in the Kulgam district. Sitting along the historic Mughal Road that once connected Kashmir to the plains, it is surrounded by dense forests and mountain views that make it one of the valley's most dramatic natural attractions.",
          highlights: ["25-metre waterfall with powerful mist and roar", "Scenic Mughal Road drive through mountain passes", "Dense pine forest walks and picnic spots", "Trout fishing in the Vishav river below the falls"],
          photos: [
            { src: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Aharbal_Waterfall.jpg/1280px-Aharbal_Waterfall.jpg", name: "Aharbal Waterfall" },
            { src: "https://images.unsplash.com/photo-1433086966358-54859d0ed716?auto=format&fit=crop&w=1400&q=85", name: "Waterfall Forest" },
            { src: "https://images.unsplash.com/photo-1668173443752-bdec2fbb3c79?auto=format&fit=crop&w=1400&q=85", name: "Aharbal River" },
            { src: "https://images.unsplash.com/photo-1694368906488-aa07d406696e?auto=format&fit=crop&w=1400&q=85", name: "Aharbal Valley" },
            { src: "https://images.unsplash.com/photo-1707804770720-d151605e5161?auto=format&fit=crop&w=1400&q=85", name: "Mughal Road" },
          ],
        },
      };


      let currentIndex = 0;
      let currentMedia = [];

      const authHeaders = {
        apikey: SUPABASE_CONFIG.anonKey,
        Authorization: `Bearer ${SUPABASE_CONFIG.anonKey}`,
      };

      const showStatus = (message, tone = "success") => {
        status.hidden = false;
        status.className = "status";
        if (tone === "error") status.classList.add("is-error");
        if (tone === "working") status.classList.add("is-working");
        status.textContent = message;
      };

      const safeJson = async (response) => {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          return { message: text || response.statusText };
        }
      };

      const details = destinationDetails[destination] || {
        heroImage: "https://commons.wikimedia.org/wiki/Special:FilePath/Shikara%20Dal%20Lake.jpg",
        subtitle: `Visitors can watch photos and short videos from ${destination} here in a clean slideshow.`,
        history: `${destination} is one of Kashmir's scenic highlights, known for memorable natural views and visitor experiences.`,
        highlights: [
          `Scenic viewpoints around ${destination}`,
          "Photography-friendly spots and landscape views",
          "Seasonal local experiences and sightseeing moments",
          "Relaxed outdoor exploration",
        ],
      };

      title.textContent = destination;
      description.textContent = details.subtitle;
      galleryTitle.textContent = `${destination} Visitor Gallery`;
      hero.style.background = `linear-gradient(135deg, rgba(2, 6, 23, 0.96), rgba(30, 41, 59, 0.92)), url("${details.heroImage}") center/cover`;

      const renderSlider = () => {
        if (currentMedia.length === 0) {
          gallery.innerHTML = `<div class="empty">No media added for ${destination} yet.</div>`;
          return;
        }

        const active = currentMedia[currentIndex];
        gallery.innerHTML = `
          <div class="slider-shell">
            <div class="slider">
              ${
                active.kind === "video"
                  ? `<video class="slide-media" src="${active.src}" controls autoplay muted loop playsinline></video>`
                  : `<img class="slide-media" src="${active.src}" alt="${active.name}" />`
              }
              <div class="slider-controls">
                <button class="nav-btn" id="prev-slide" type="button">&#8249;</button>
                <button class="nav-btn" id="next-slide" type="button">&#8250;</button>
              </div>
            </div>
            <div class="slide-meta">
              <div>
                <div class="slide-name">${destination} Showcase</div>
                <div class="slide-count">Slide ${currentIndex + 1} of ${currentMedia.length}</div>
              </div>
              <div class="dots">
                ${currentMedia
                  .map(
                    (_, index) =>
                      `<button class="dot ${index === currentIndex ? "active" : ""}" data-index="${index}" type="button" aria-label="Go to slide ${index + 1}"></button>`
                  )
                  .join("")}
              </div>
            </div>
            <div class="info-grid">
              <div class="info-card">
                <h3>History</h3>
                <p>${details.history}</p>
              </div>
              <div class="info-card">
                <h3>What To See Here</h3>
                <ul class="info-list">
                  ${details.highlights.map((item) => `<li>${item}</li>`).join("")}
                </ul>
              </div>
            </div>
          </div>
        `;

        document.getElementById("prev-slide").addEventListener("click", () => {
          currentIndex = (currentIndex - 1 + currentMedia.length) % currentMedia.length;
          renderSlider();
        });

        document.getElementById("next-slide").addEventListener("click", () => {
          currentIndex = (currentIndex + 1) % currentMedia.length;
          renderSlider();
        });

        Array.from(document.querySelectorAll(".dot")).forEach((dot) => {
          dot.addEventListener("click", () => {
            currentIndex = Number(dot.getAttribute("data-index"));
            renderSlider();
          });
        });
      };

      const loadGallery = async () => {
        // Load built-in photos immediately — no waiting
        const builtIn = (details.photos || []).map((p) => ({ name: p.name, kind: "image", src: p.src }));
        currentMedia = builtIn;
        currentIndex = 0;
        status.hidden = true;
        renderSlider();

        // Then try to merge any uploaded media from Supabase on top
        try {
          const query = new URLSearchParams({
            select: "id,destination,file_name,media_type,public_url,file_path,created_at",
            destination: `eq.${destination}`,
            order: "created_at.desc",
          });
          const response = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/${TABLE_NAME}?${query.toString()}`, { headers: authHeaders });
          if (response.ok) {
            const data = await safeJson(response);
            const uploaded = (data || []).map((item) => ({ id: item.id, name: item.file_name, kind: item.media_type, src: item.public_url }));
            if (uploaded.length > 0) {
              currentMedia = [...uploaded, ...builtIn];
              currentIndex = 0;
              renderSlider();
            }
          }
        } catch (_) { /* silently ignore — built-in photos already showing */ }
      };

      window.addEventListener("error", (event) => {
        showStatus(`Page error: ${event.message}`, "error");
      });

      loadGallery().catch((error) => {
        showStatus(`Setup failed: ${error.message}`, "error");
      });
    </script>
  </body>
</html>
